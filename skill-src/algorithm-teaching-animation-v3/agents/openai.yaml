interface:
  display_name: "Algorithm Teaching Animation v3"
  short_description: "Minimal-input, brief-first algorithm animation workflow"
  default_prompt: "Use $algorithm-teaching-animation-v3. Read the top-level phase contract first and follow its artifact chain exactly. Start from the user's algorithm name, sample input or scenario, and any special animation preference. Identify and ask all high-impact clarification gaps before freezing the brief. Produce a confirmable pre_build_brief.md, keep optional overlays opt-in, keep delivery tier selection neutral until clarification closes, then record the frozen tier in the brief before explicit approval, and use English as the default narration language only when narration is required and the language remains unspecified. Do not begin SCRIPT until the brief is confirmed. In SCRIPT, produce teaching_script.md and do not treat SCRIPT as direct scene coding. Do not begin RENDER until teaching_script.md exists, the script gate is satisfied, `voiceover_status.md` exists for `silent preview`, and narration-required tiers already have the required voiceover artifacts and usable audio assets. Do not advance to DELIVERY without `scene_review_result.md = PASS` and `qa_result.md = PASS`."
